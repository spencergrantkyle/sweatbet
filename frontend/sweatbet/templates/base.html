<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SweatBet{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/sweatbet/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">💪</span>
                <span class="logo-text">SweatBet</span>
            </a>
            <div class="nav-links">
                {% if user %}
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/bets" class="nav-link">My Bets</a>
                <a href="/settings" class="nav-link">Settings</a>
                <a href="/auth/logout" class="nav-link">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="/privacy" class="footer-link">Privacy Policy</a>
                <span class="footer-divider">•</span>
                <a href="/terms" class="footer-link">Terms of Service</a>
            </div>
            <p>&copy; 2026 SweatBet. Put your money where your miles are.</p>
        </div>
    </footer>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
